commit-msg:
  commands:
    conventional-commits:
      run: |
        REGEX="^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\((cli|sync|manifest|encrypted|ci|deps|bootstrap)\))?: .+"
        if ! echo "{1}" | grep -qE "$REGEX"; then
          echo "Error: Commit message does not follow conventional commits format."
          echo ""
          echo "Expected format: type(scope): description"
          echo ""
          echo "Valid types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
          echo "Valid scopes: cli, sync, manifest, encrypted, ci, deps, bootstrap"
          echo ""
          echo "Examples:"
          echo "  feat(cli): add update command"
          echo "  fix(sync): resolve symlink conflict on macOS"
          echo "  chore(ci): add release-please workflow"
          exit 1
        fi
