name: Commitlint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to check all commits in PR

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
