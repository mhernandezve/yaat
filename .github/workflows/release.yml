# This workflow runs cargo-dist to build and distribute binaries
# It is triggered by Release Please when a release is published

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Run 'cargo dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-x86_64-unknown-linux-gnu.tar.xz | tar -xJ
          mv cargo-dist /usr/local/bin/
          cargo-dist --version
      - id: plan
        run: |
          cargo-dist plan ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }} --output-format=json > dist-manifest.json
          echo "manifest=$(cat dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan
          path: dist-manifest.json

  # Build and upload all artifacts for each target platform
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    runs-on: ${{ matrix.runner }}
    needs: [plan]
    strategy:
      fail-fast: false
      matrix:
        include:
          - targets: x86_64-unknown-linux-gnu
            runner: ubuntu-20.04
          - targets: aarch64-unknown-linux-gnu
            runner: ubuntu-20.04
          - targets: x86_64-apple-darwin
            runner: macos-13
          - targets: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      - name: Install cargo-dist
        shell: bash
        run: |
          if [[ "${{ matrix.runner }}" == ubuntu* ]]; then
            curl --proto '=https' --tlsv1.2 -fsSL https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-x86_64-unknown-linux-gnu.tar.xz | tar -xJ
            mv cargo-dist /usr/local/bin/
          else
            curl --proto '=https' --tlsv1.2 -fsSL https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-x86_64-apple-darwin.tar.xz | tar -xJ
            mv cargo-dist /usr/local/bin/
          fi
          cargo-dist --version
      - name: Install cross-compilation tools
        if: matrix.targets == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build artifacts
        run: |
          cargo-dist build \
            --target=${{ matrix.targets }} \
            ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }} \
            --output-format=json \
            > dist-manifest.json
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.targets }}
          path: |
            dist-manifest.json
            target/dist/

  # Build and upload all global artifacts
  build-global-artifacts:
    needs: [plan, build-local-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-x86_64-unknown-linux-gnu.tar.xz | tar -xJ
          mv cargo-dist /usr/local/bin/
          cargo-dist --version
      - name: Fetch local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/dist/
          merge-multiple: true
      - name: Build global artifacts
        run: |
          cargo-dist build --artifacts=global \
            ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }} \
            --output-format=json \
            > dist-manifest.json
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-global
          path: |
            dist-manifest.json
            target/dist/

  # Publish the release
  publish-release:
    needs: [plan, build-global-artifacts]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-x86_64-unknown-linux-gnu.tar.xz | tar -xJ
          mv cargo-dist /usr/local/bin/
          cargo-dist --version
      - name: Fetch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/dist/
          merge-multiple: true
      - name: Publish release
        run: |
          cargo-dist host ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }} \
            --steps=upload,release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
